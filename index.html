<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillsBuilder AI | Bridge</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0F172A;
            --surface: #1E293B;
            --accent: #3B82F6;
            --text: #F1F5F9;
            --secondary: #94A3B8;
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: var(--surface);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .logo {
            font-size: 48px;
            color: var(--accent);
            margin-bottom: 24px;
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        p {
            color: var(--secondary);
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 16px;
            transition: all 0.3s;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }
        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px rgba(59, 130, 246, 0.5);
            filter: brightness(1.1);
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><i class="fas fa-brain"></i></div>
        <h1>SkillsBuilder AI 已就緒</h1>
        <p>系統已成功啟動。請點擊下方按鈕進入 3D 知識門戶與智慧郵件分析系統。若無法連線，請確保 Flask 伺服器正在運行。</p>
        <a href="http://localhost:5000" class="btn">
            進入系統 <i class="fas fa-arrow-right"></i>
        </a>
        <div class="footer">
            SkillsBuilder Pro v2.0 | Digital Art Director Edition
        </div>
    </div>
</body>
</html>
