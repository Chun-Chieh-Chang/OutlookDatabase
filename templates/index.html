<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outlook AI 知識庫 | SkillsBuilder AI</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome - Fallback Link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Local CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    
    <!-- Vendor Scripts -->
    <script src="{{ url_for('static', filename='vendor/marked.min.js') }}"></script>
    
    <script>
        window.DB_EXISTS = {{ db_exists_js|safe }};
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    
    <style>
        /* Premium Top Settings Panel - Vanilla CSS Edition */
        #aiControlCenter {
            position: fixed;
            top: 48px;
            left: 0;
            right: 0;
            z-index: 10001;
            justify-content: center;
            display: flex;
        }
        
        #aiControlCenter .modal-container {
            width: 100%;
            background-color: #ffffff !important;
            border-bottom: 1px solid #e2e8f0;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            animation: slideDownFull 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideDownFull {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        .panel-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #f1f5f9;
        }

        .panel-title h2 {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .panel-title p {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn-panel {
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-cancel {
            background-color: #f1f5f9;
            color: #64748b;
        }
        .btn-cancel:hover {
            background-color: #e2e8f0;
            color: #475569;
        }

        .btn-save {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
        }
        .btn-save:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }

        .grid-config {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }

        .config-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .config-label {
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .config-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            font-size: 14px;
            color: #1e293b;
            outline: none;
            transition: all 0.2s;
        }
        .config-input:focus {
            border-color: #3b82f6;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .modal-overlay-bg {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px);
            z-index: 9998;
            display: none;
        }
    </style>
</head>
<body>
    <div id="modalOverlayBg" class="modal-overlay-bg hidden" onclick="closeSettings()"></div>
    
    <!-- Settings Panel (Top Anchored) -->
    <div id="aiControlCenter" class="hidden">
        <div class="modal-container">
            <div class="panel-content">
                <div class="panel-header">
                    <div class="panel-title">
                        <h2><i class="fas fa-brain text-blue-500"></i> AI 核心配置</h2>
                        <p>調整 SkillsBuilder 的雲端推理與本地運算參數</p>
                    </div>
                    <div class="btn-group">
                        <button onclick="closeSettings()" class="btn-panel btn-cancel">取消</button>
                        <button onclick="saveSettings()" class="btn-panel btn-save">儲存並套用</button>
                    </div>
                </div>
                
                <div class="grid-config">
                    <!-- Left Column -->
                    <div class="config-section">
                        <div class="config-group">
                            <label class="config-label">AI 推理供應商</label>
                            <select id="settingProvider" class="config-input" onchange="toggleSettingFields()">
                                <option value="ollama">Local Ollama (本機)</option>
                                <option value="google" selected>Google Gemini (雲端大腦)</option>
                            </select>
                        </div>
                        <div id="ollamaFields" class="config-section" style="margin-top: 24px;">
                            <div class="config-group">
                                <label class="config-label">服務位址</label>
                                <input type="text" id="settingOllamaUrl" class="config-input" value="http://localhost:11434">
                            </div>
                            <div class="config-group">
                                <label class="config-label">本地模型</label>
                                <select id="settingOllamaModel" class="config-input"><option value="">載入中...</option></select>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Right Column -->
                    <div class="config-section" style="border-left: 1px solid #f1f5f9; padding-left: 60px;">
                        <div id="geminiFields" class="config-section">
                            <div class="config-group">
                                <label class="config-label">Gemini API Key</label>
                                <div style="position: relative;">
                                    <input type="password" id="settingGeminiKey" class="config-input" placeholder="貼上 Key" style="padding-right: 48px;">
                                    <i class="fas fa-eye" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; cursor: pointer;" onclick="togglePassword('settingGeminiKey')"></i>
                                </div>
                                <p style="font-size: 11px; color: #3b82f6; margin-top: 8px; font-weight: 600;">
                                    <i class="fas fa-external-link-alt" style="font-size: 9px;"></i> <a href="https://aistudio.google.com/app/apikey" target="_blank" style="text-decoration: none; color: inherit;">獲起您的 API Key</a>
                                </p>
                            </div>
                            <div class="config-group">
                                <label class="config-label">模型版本</label>
                                <select id="settingGeminiModel" class="config-input">
                                    <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                                    <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                                    <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="container flex justify-between items-center h-full">
            <div class="brand text-white font-bold flex items-center gap-2">
                <i class="fas fa-brain text-blue-400"></i>
                <span>SkillsBuilder AI</span>
            </div>
            <div class="flex items-center gap-6">
                <div id="aiStatus" class="text-xs font-medium text-slate-300 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-slate-500"></span>
                    AI 初始化中...
                </div>
                <button onclick="openSettings()" class="text-slate-400 hover:text-white transition-colors" title="AI 核心設定">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="app-container">
        <!-- Hero - 標題與統計 -->
        <header class="hero-section animate-fade-in">
            <div class="hero-glow"></div>
            <h1>Outlook AI 知識助手</h1>
            <p class="hero-subtitle">智能提取 Outlook 郵件，建構專屬專案知識庫</p>
            <div class="stats-strip">
                <div class="stat-item"><i class="fas fa-database"></i> 郵件總數: <b id="totalEmails">-</b></div>
                <div class="stat-item"><i class="fas fa-clock"></i> 最後更新: <b id="lastUpdateTime">剛剛</b></div>
            </div>
        </header>

        <!-- Main Action - 一鍵同步 -->
        <div class="action-card animate-fade-in">
            <div class="action-info">
                <h2>同步並更新知識庫</h2>
                <p>提取 Outlook 郵件、附件並透過 AI 重建知識圖譜</p>
            </div>
            <button class="btn btn-lg btn-shimmer btn-primary px-8 py-4" onclick="runFullPipeline()">
                <i class="fas fa-sync-alt mr-2"></i> 開始全量更新
            </button>
        </div>

        <!-- Search Area -->
        <div class="search-section">
            <div class="search-container">
                <div class="search-input-group">
                    <i class="search-icon fas fa-search"></i>
                    <input type="text" id="searchKeyword" class="search-input" placeholder="搜尋郵件內容或提問 AI...">
                    <button class="search-btn btn-primary" onclick="searchEmails()">
                        <i class="fas fa-bolt"></i>
                        <span>搜尋</span>
                    </button>
                    <button class="ai-btn" onclick="askWiki()" style="background: linear-gradient(135deg, #a855f7, #6366f1); color: white; border-radius: 1rem; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; border: none; cursor: pointer;">
                        <i class="fas fa-magic"></i>
                        <span>AI 提問</span>
                    </button>
                </div>
                <div class="search-suggestions">
                    <span class="suggestion-chip" onclick="setSearchValue('專案報告')">專案報告</span>
                    <span class="suggestion-chip" onclick="setSearchValue('會議記錄')">會議記錄</span>
                    <span class="suggestion-chip" onclick="setSearchValue('AI 分析')">AI 分析</span>
                </div>
                
                <!-- Inline Loading Indicator -->
                <div id="inlineLoading" class="hidden mt-6 animate-pulse">
                    <div class="flex items-center justify-center gap-4 p-6 bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm rounded-2xl border border-blue-100 dark:border-blue-900/30">
                        <div class="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                        <div class="text-sm font-medium text-slate-600 dark:text-slate-300" id="inlineLoadingMessage">AI 正在深思中...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Content Area -->
        <div class="results-grid">
            <div class="space-y-6">
                <!-- Dashboard -->
                <div id="dashboardInitial" class="animate-fade-in space-y-8">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="dashboard-card bg-gradient-to-br from-blue-500/10 to-blue-600/5 border border-blue-100 dark:border-blue-900/30 p-6 rounded-3xl">
                            <div class="flex items-center gap-4 mb-4">
                                <div class="w-12 h-12 rounded-2xl bg-blue-500 text-white flex items-center justify-center text-xl shadow-lg shadow-blue-500/20">
                                    <i class="fas fa-project-diagram"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-lg">知識圖譜統計</h4>
                                    <p class="text-xs text-slate-500">已自動識別的知識實體</p>
                                </div>
                            </div>
                            <div class="flex justify-between mt-6">
                                <div class="text-center flex-1 border-r border-slate-200 dark:border-slate-700">
                                    <div class="text-2xl font-bold text-blue-500" id="dashEntityCount">-</div>
                                    <div class="text-[10px] text-slate-400 uppercase font-bold">識別實體</div>
                                </div>
