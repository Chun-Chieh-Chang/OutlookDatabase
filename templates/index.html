<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outlook AI 知識庫 | SkillsBuilder Lite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.DB_EXISTS = {{ db_exists_js|safe }};
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    <style>
        :root {
            --max-width: 1000px;
        }
        .app-container {
            display: block; /* Remove grid sidebar for simplicity */
            max-width: var(--max-width);
            margin: 0 auto;
            padding: var(--space-8) var(--space-4);
        }
        .main-content {
            padding: 0;
        }
        .hero-section {
            text-align: center;
            margin-bottom: var(--space-12);
        }
        .action-card {
            background: linear-gradient(135deg, var(--brand-accent), #2563eb);
            color: white;
            padding: var(--space-8);
            border-radius: var(--radius-2xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-8);
            box-shadow: var(--shadow-lg);
        }
        .action-info h2 { font-size: 1.5rem; margin-bottom: var(--space-1); }
        .action-info p { opacity: 0.9; font-size: 0.9rem; }
        
        .search-container {
            background: var(--bg-surface);
            border-radius: var(--radius-2xl);
            padding: var(--space-2);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-subtle);
            display: flex;
            gap: var(--space-2);
            margin-bottom: var(--space-8);
        }
        .search-input {
            flex: 1;
            border: none;
            padding: var(--space-4) var(--space-6);
            font-size: 1.1rem;
            outline: none;
            background: transparent;
            color: var(--text-primary);
        }
        .search-btn {
            background: var(--brand-accent);
            color: white;
            border: none;
            padding: 0 var(--space-8);
            border-radius: var(--radius-xl);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .search-btn:hover { filter: brightness(1.1); transform: scale(1.02); }

        .stats-strip {
            display: flex;
            gap: var(--space-8);
            margin-bottom: var(--space-12);
            justify-content: center;
        }
        .stat-item { display: flex; align-items: center; gap: var(--space-2); color: var(--text-secondary); font-size: 0.9rem; }
        .stat-item i { color: var(--brand-accent); }
        .stat-item b { color: var(--text-primary); }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: var(--space-8);
        }
        @media (max-width: 850px) {
            .results-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Hero - 標題與統計 -->
        <header class="hero-section">
            <h1 class="text-4xl font-black mb-4">Outlook AI 知識助手</h1>
            <div class="stats-strip">
                <div class="stat-item"><i class="fas fa-database"></i> 郵件總數: <b id="totalEmails">-</b></div>
                <div class="stat-item"><i class="fas fa-robot"></i> AI 狀態: <b id="aiStatus">檢查中...</b></div>
                <div class="stat-item"><i class="fas fa-clock"></i> 最後更新: <b id="lastUpdate">剛剛</b></div>
            </div>
        </header>

        <!-- Main Action - 一鍵同步 -->
        <div class="action-card animate-fade-in">
            <div class="action-info">
                <h2>同步並更新知識庫</h2>
                <p>提取 Outlook 郵件、附件並透過 AI 重建知識圖譜</p>
            </div>
            <button class="btn btn-lg bg-white text-blue-600 hover:bg-gray-50 px-8 py-4 rounded-2xl font-bold shadow-sm" onclick="runFullPipeline()">
                <i class="fas fa-sync-alt mr-2"></i> 開始全量更新
            </button>
        </div>

        <!-- Search Area - 智慧搜尋與問答 -->
        <div class="search-container animate-fade-in">
            <input type="text" id="searchKeyword" class="search-input" placeholder="問問題或搜尋郵件內容...">
            <button class="search-btn" onclick="askWiki()">
                <i class="fas fa-paper-plane mr-2"></i> 提問 / 搜尋
            </button>
        </div>

        <!-- Content Area - 結果顯示 -->
        <div class="results-grid">
            <!-- Left: Answers & Search Results -->
            <div class="space-y-6">
                <div id="wikiAnswer" class="hidden animate-fade-in p-8 bg-white dark:bg-slate-800 rounded-3xl border border-gray-100 dark:border-slate-700 shadow-xl prose dark:prose-invert max-w-none">
                    <!-- AI Answer goes here -->
                </div>
                
                <div class="card p-6">
                    <h3 class="font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-search text-blue-500"></i> 相關郵件內容
                    </h3>
                    <div id="searchResults" class="space-y-4">
                        <p class="text-gray-400 text-center py-8">輸入關鍵字開始檢索...</p>
                    </div>
                </div>
            </div>

            <!-- Right: Context & Quick Actions -->
            <div class="space-y-6">
                <div class="card p-6">
                    <h3 class="font-bold mb-4">快速工具</h3>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="analyzeEmailInsights()" class="nav-action text-sm">
                            <i class="fas fa-chart-line"></i> 產生分析報告
                        </button>
                        <button onclick="showView('wiki')" class="nav-action text-sm">
                            <i class="fas fa-project-diagram"></i> 瀏覽知識圖譜
                        </button>
                        <button onclick="exportData()" class="nav-action text-sm">
                            <i class="fas fa-download"></i> 匯出 CSV
                        </button>
                        <button onclick="clearAndRebuild()" class="nav-action text-sm text-red-500">
                            <i class="fas fa-trash"></i> 重置資料庫
                        </button>
                    </div>
                </div>

                <div class="card p-6">
                    <h3 class="font-bold mb-4">最近提取</h3>
                    <div id="recentEmails" class="space-y-3 text-sm">
                        <!-- Recent list -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Wiki Modal (hidden by default) -->
        <div id="view-wiki" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center hidden p-8">
            <div class="bg-white dark:bg-slate-900 w-full max-w-5xl h-[80vh] rounded-3xl overflow-hidden flex flex-col shadow-2xl">
                <div class="p-6 border-b flex justify-between items-center">
                    <h2 class="text-xl font-bold">知識圖譜瀏覽器</h2>
                    <button class="p-2 hover:bg-gray-100 rounded-full" onclick="document.getElementById('view-wiki').classList.add('hidden')">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="flex-1 overflow-hidden flex">
                    <div id="wikiIndex" class="w-64 border-r p-4 overflow-y-auto bg-gray-50 dark:bg-slate-800"></div>
                    <div id="wikiContent" class="flex-1 p-8 overflow-y-auto prose dark:prose-invert max-w-none"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center hidden z-[100]">
        <div class="bg-white dark:bg-slate-800 rounded-3xl p-10 text-center shadow-2xl">
            <div class="loading-spinner mx-auto mb-6"></div>
            <p id="loadingMessage" class="text-xl font-bold">全量同步中，請稍候...</p>
            <p class="text-gray-500 mt-2">系統正在處理 Outlook 資料與建構索引</p>
        </div>
    </div>
</body>
</html>
